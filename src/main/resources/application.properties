spring.application.name=tarefas

# Datasource - H2 em modo arquivo (escopo-todo.md §2)
spring.datasource.url=jdbc:h2:file:./data/tarefas;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

# H2 console (dev)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Contrato temporal (escopo-todo.md §3)
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC

# Actuator - health remapeado para /health (decisão registrada no escopo §4.0)
management.endpoints.web.base-path=/
management.endpoints.web.path-mapping.health=health
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=when_authorized

# OpenAPI / Swagger (springdoc-openapi 1.7.0)
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.show-actuator=false
